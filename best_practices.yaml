best_practices:
  - id: concise-operational-skill-surface
    title: Keep the skill entrypoint concise and procedural
    summary: >
      The top-level skill doc should say when to trigger the runtime, what it owns,
      what it does not own, and which deeper references to read first.
    categories: [documentation, maintainability]

  - id: references-layer-for-deep-guidance
    title: Put deep guidance in references, not the skill body
    summary: >
      Keep SKILL.md cheap to load. Put architecture rationale, source baselines,
      and extension guidance in a dedicated references layer.
    categories: [documentation, knowledge]

  - id: instruction-layering
    title: Layer runtime instructions and project-specific guidance
    summary: >
      Keep the base REPL skill focused on terminal runtime behavior. Put repo-specific
      policies, business workflows, and domain tool rules in higher-level project
      instructions instead of baking them into the runtime layer.
    categories: [architecture, documentation]

  - id: explicit-context-engineering-layers
    title: Treat context as layered inputs
    summary: >
      Keep system/base instructions, developer/runtime instructions, project-doc guidance,
      memory summaries, tool state, plan state, and user turns as explicit layers instead of
      flattening everything into one opaque prompt blob.
    categories: [context, architecture]

  - id: separate-stable-and-dynamic-context
    title: Keep stable and dynamic context separate
    summary: >
      Stable instructions and long-lived guidance should be handled differently from current
      turn state, active tool state, and pending review state so compaction and debugging stay tractable.
    categories: [context, maintainability]

  - id: explicit-runtime-contract
    title: Make the operator-visible runtime contract explicit
    summary: >
      Document mode behavior, slash commands, shell execution boundaries, and transcript
      guarantees clearly enough that downstream projects do not need to infer them from code.
    categories: [runtime, operability]

  - id: separate-runtime-agent-and-approval-modes
    title: Keep routing modes, agent modes, and approval modes separate
    summary: >
      Distinguish runtime input modes like chat or shell from operational modes like plan or
      build, and from approval modes like suggest or full-auto. They answer different questions
      and should not be overloaded into one hidden state machine.
    categories: [runtime, architecture]

  - id: do-not-promote-internal-modes-to-primary-ux
    title: Do not promote internal routing modes to the primary UX
    summary: >
      Runtime routing states like chat, shell, and multiline may exist internally, but they
      should not become the main operator mental model for an AI-oriented shell.
    categories: [runtime, ux]

  - id: natural-language-turns-first
    title: Keep natural-language turns as the default interaction
    summary: >
      Operators should normally ask for work in natural language and let the orchestrator select
      tools and shell actions automatically, pausing only when policy requires approval.
    categories: [runtime, ux]

  - id: treat-startup-cwd-as-default-context
    title: Treat startup cwd as default workspace context
    summary: >
      Unless the user names another target, the shell should treat the startup working directory
      as the default workspace or investigation context and make it visible to the orchestrator.
    categories: [runtime, context]

  - id: discover-before-asking-the-user
    title: Discover before asking the user
    summary: >
      If the next safe read-only step is obvious, the orchestrator should inspect the workspace
      itself before asking the operator to type shell commands like `pwd` or `ls`.
    categories: [runtime, ux]

  - id: summarize-observed-facts-before-next-step
    title: Summarize observed facts before the next step
    summary: >
      After a discovery step, the shell should tell the operator what it observed, what it inferred,
      and what next safe action it is taking or recommending.
    categories: [runtime, ux]

  - id: map-project-root-before-deep-reads
    title: Map the project root before deep reads
    summary: >
      Before reading arbitrary deep source files, identify the project root, top-level tree,
      and key root metadata so later reasoning stays grounded in the actual repo shape.
    categories: [context, tools]

  - id: inspect-root-metadata-as-meaning-anchor
    title: Inspect root metadata as a meaning anchor
    summary: >
      Read high-value root files like README, AGENTS, and build manifests early because they
      usually explain the project's meaning, stack, and workflows better than random source files.
    categories: [context, documentation]

  - id: split-short-and-long-term-memory
    title: Separate short-term and long-term memory
    summary: >
      Distinguish local draft/session recall from persisted history, compacted summaries,
      and project-doc guidance. Do not treat all memory as one undifferentiated store.
    categories: [memory, architecture]

  - id: use-project-docs-as-structured-memory
    title: Use project docs as structured long-term memory
    summary: >
      Keep repo-local guidance layered and explicit. Project-doc memory should not be mixed
      into raw chat history as if it were the same thing.
    categories: [memory, documentation]

  - id: make-model-selection-explicit
    title: Keep model and provider configuration explicit
    summary: >
      Provider, model, reasoning level, and related config should be operator-visible and
      documented rather than buried in code or implicit defaults.
    categories: [configuration, operability]

  - id: tie-token-policy-to-model-capabilities
    title: Tie token policy to model capabilities
    summary: >
      Token budgets should be keyed to the selected model, provider, output-token limit,
      and reasoning behavior instead of assuming one universal budget for every model.
    categories: [configuration, context]

  - id: use-small-model-role-explicitly
    title: Use the small-model role explicitly
    summary: >
      Follow the upstream pattern of assigning smaller or cheaper models to bounded lightweight
      tasks explicitly. Do not infer "small model" from a guessed size threshold alone.
    categories: [configuration, architecture]

  - id: model-aware-prompt-composition
    title: Make prompt composition model-aware
    summary: >
      Reasoning level, modality support, provider behavior, and variant/personality should be
      considered explicitly when composing prompt messages instead of assuming one universal prompt.
    categories: [configuration, context]

  - id: ship-reusable-prompt-templates
    title: Keep reusable prompt templates for major shell modes
    summary: >
      Base, developer, compact, plan, and build prompt layers should be explicit and reusable
      rather than recreated ad hoc in multiple code paths.
    categories: [prompting, maintainability]

  - id: repl-first-runtime
    title: Build the interaction loop first
    summary: >
      Start with a robust REPL runtime before moving to full-screen terminal UI.
      This keeps command routing, transcript recording, and shell execution decoupled
      from any particular layout framework.
    categories: [architecture, runtime]

  - id: explicit-mode-boundaries
    title: Keep routing states explicit internally
    summary: >
      Distinguish assistant conversation, shell execution, and buffered multiline input
      with first-class runtime routing states when the runtime needs them. Do not collapse
      them into one ambiguous stream, but do not force operators to manage those states as
      the primary AI-shell UX either.
    categories: [runtime, architecture]

  - id: asyncio-by-default
    title: Use asyncio from the beginning
    summary: >
      Live output streaming, shell execution, agent responses, and future watch tasks
      all fit naturally into one async event loop.
    categories: [concurrency, runtime]

  - id: input-engine-separation
    title: Keep input handling separate from execution
    summary: >
      The prompt loop should not be tightly coupled to the agent implementation,
      shell transport, or renderer. Treat the prompt engine as a replaceable adapter.
    categories: [architecture, extensibility]

  - id: shell-as-tool-channel
    title: Treat shell access as a separate tool channel
    summary: >
      Do not mix agent prompts and raw shell streams in the same uncontrolled channel.
      Route shell execution through a dedicated bridge with auditing and structured results.
    categories: [safety, architecture]

  - id: expose-tool-loop-state
    title: Expose tool-loop and turn state explicitly
    summary: >
      Model tool-driven turns as a visible loop with model, approval, tool, and completion
      phases instead of hiding them inside a black-box agent run.
    categories: [runtime, operability]

  - id: orchestrator-owns-tool-selection
    title: Keep tool selection in the orchestrator
    summary: >
      Tool invocation should be chosen by the orchestrator from turn intent and state, not by
      forcing the user to manually switch into a shell-routing mode first.
    categories: [runtime, architecture]

  - id: slash-commands-are-control-surfaces
    title: Use slash commands as control surfaces
    summary: >
      Slash commands should expose shell controls, explicit overrides, and administrative actions,
      but they should not replace the main natural-language agent loop.
    categories: [ux, architecture]

  - id: run-is-an-override
    title: Keep `/run` as an explicit override
    summary: >
      `/run` is useful for manual operator-issued shell commands, but it should remain an escape
      hatch rather than the normal path for AI-driven tool execution.
    categories: [ux, runtime]

  - id: do-not-tutor-obvious-shell-commands
    title: Do not tutor obvious shell commands
    summary: >
      An AI shell should not answer obvious safe discovery needs by telling the user to type
      `pwd`, `ls`, or similar commands when the orchestrator could have run that step itself.
    categories: [ux, runtime]

  - id: prefer-non-interactive-repo-scouting
    title: Prefer non-interactive repo scouting
    summary: >
      Prefer transcriptable discovery like list, glob, grep, read, `rg --files`, `find`,
      `sed -n`, and focused `awk` over interactive pagers when the shell is scouting a repo.
    categories: [tools, operability]

  - id: avoid-interactive-pagers-in-agent-loop
    title: Avoid interactive pagers in the agent loop
    summary: >
      Tools like `less` may help a human operator, but they are a poor default for autonomous
      agent reasoning because they are harder to automate, transcript, and replay.
    categories: [tools, operability]

  - id: keep-tool-registry-discoverable
    title: Keep tool schemas and origins discoverable
    summary: >
      The shell should be able to expose tool ids, schemas, origins, and approval expectations
      so tool use is inspectable by both operators and downstream agent logic.
    categories: [tools, operability]

  - id: choose-the-cheapest-sufficient-tool
    title: Prefer the cheapest sufficient tool
    summary: >
      Prefer specialized tools like glob, grep, and read before escalating to broad shell
      commands or open-ended subagent/task tools. Use the narrowest tool that answers the question.
    categories: [tools, efficiency]

  - id: prefer-cheapest-safe-read-only-discovery
    title: Prefer the cheapest safe read-only discovery step
    summary: >
      For local workspace awareness, reuse known context first, then inspect cheap metadata or
      directory contents, then narrow with search and read tools before broad shell execution.
    categories: [tools, efficiency]

  - id: infer-stack-from-manifests-before-symbols
    title: Infer stack from manifests before symbols
    summary: >
      Read root manifests and config files before symbol-hunting so the shell does not guess the
      language, package manager, build flow, or repo conventions from incomplete evidence.
    categories: [context, tools]

  - id: use-glob-grep-read-in-order
    title: Narrow with glob and grep before reading
    summary: >
      For codebase exploration, narrow candidate files with glob, search content with grep,
      and only then read the most relevant files. This keeps context smaller and searches faster.
    categories: [tools, efficiency]

  - id: avoid-tiny-repeated-file-slices
    title: Avoid tiny repeated reads
    summary: >
      Prefer larger windows and intentional offsets over many tiny file reads that create
      context churn without materially improving understanding.
    categories: [tools, efficiency]

  - id: reserve-task-tools-for-open-ended-work
    title: Use task/subagent tools for open-ended work only
    summary: >
      When the target is already a small known set of files, use direct search and read tools.
      Reserve task/subagent tools for genuinely multi-step or exploratory work.
    categories: [tools, operability]

  - id: parallelize-independent-tool-calls
    title: Parallelize independent tool calls
    summary: >
      Run independent reads, searches, and status commands in parallel when their outputs do
      not depend on one another, and keep sequential ordering only when one step informs the next.
    categories: [tools, efficiency]

  - id: ask-only-on-ambiguity-or-approval
    title: Ask only on ambiguity or approval boundaries
    summary: >
      Interrupt the operator only when multiple plausible targets exist, approval is required,
      or the evidence remains insufficient after safe discovery.
    categories: [ux, safety]

  - id: use-compact-prompts-intentionally
    title: Compact intentionally instead of truncating blindly
    summary: >
      Compaction should preserve user intent, key constraints, and the current plan/tool state.
      It should be visible to the operator and treated as a policy decision rather than hidden cleanup.
    categories: [context, memory]

  - id: reserve-context-headroom
    title: Reserve context headroom
    summary: >
      Do not fill the full context window with history. Reserve headroom for instructions,
      tool overhead, and expected model output before deciding how much prior state to include.
    categories: [context, efficiency]

  - id: compact-before-overflow
    title: Compact before overflow
    summary: >
      Trigger compaction from policy thresholds before a hard context-window failure whenever the
      implementation can see budget pressure early.
    categories: [context, runtime]

  - id: preserve-active-state-during-compaction
    title: Preserve active state during compaction
    summary: >
      Compaction should keep the active plan, tool state, review state, and workspace context
      intact rather than compressing away the information that explains the current turn.
    categories: [context, runtime]

  - id: do-not-fill-the-entire-context-window
    title: Do not fill the entire context window
    summary: >
      Use only part of the available window for replayable history when the runtime can preserve
      quality by reserving explicit headroom, as Codex does in its memory pipeline.
    categories: [context, efficiency]

  - id: treat-project-docs-as-structured-context
    title: Treat project docs as structured context, not chat
    summary: >
      Repo-local instructions should remain a scoped context layer with precedence rules rather
      than being mixed into raw chat history as if they were ordinary conversation.
    categories: [documentation, context]

  - id: approval-policy-outside-runtime
    title: Keep approval policy outside the prompt loop
    summary: >
      If a project needs approvals or sandbox policy, implement that at the shell bridge or
      orchestration layer rather than mixing it into prompt rendering and routing code.
    categories: [safety, architecture]

  - id: permissions-are-not-a-sandbox
    title: Document permissions honestly as UX or policy
    summary: >
      Permission prompts and auto-accept flows are not the same thing as sandboxing.
      If the runtime is not actually isolated, document that clearly and treat isolation as
      a separate infrastructure concern.
    categories: [safety, operability]

  - id: vcs-aware-high-autonomy-safety
    title: Make high-autonomy behavior VCS-aware
    summary: >
      When a shell offers higher-autonomy modes, make the user aware when the current
      workspace is not under version control or otherwise lacks an obvious recovery path.
    categories: [safety, operability]

  - id: keep-tui-as-one-client
    title: Treat the terminal UI as one client of the runtime
    summary: >
      A strong terminal experience should not force the runtime core to depend on a single
      presentation layer. Preserve the option for headless APIs, richer TUIs, or other clients.
    categories: [architecture, extensibility]

  - id: explicit-plan-vs-build-behavior
    title: Keep planning and execution behaviors explicit
    summary: >
      If a project needs read-only planning and mutating execution, model those as explicit
      agent or session behaviors rather than overloading one mode with hidden rules.
    categories: [runtime, architecture]

  - id: session-lifecycle-is-first-class
    title: Treat session lifecycle as first-class state
    summary: >
      Once a shell grows beyond a minimal loop, model session creation, resume, fork,
      compaction, and archival explicitly instead of encoding them only in ad hoc UI state.
    categories: [runtime, operability]

  - id: plans-should-be-explicit-artifacts
    title: Keep plans explicit and reviewable
    summary: >
      If the shell supports planning, make plans visible, resumable, and clearly distinct
      from raw chat text. Do not let planning dissolve into untracked internal reasoning.
    categories: [planning, operability]

  - id: evaluate-shell-behavior-beyond-command-success
    title: Evaluate more than command success
    summary: >
      Shell verification should include operator-visible state, transcript behavior,
      approval behavior, and review surfaces rather than only whether commands ran.
    categories: [verification, operability]

  - id: use-layered-llm-observability
    title: Use layered LLM observability
    summary: >
      Keep lightweight operational logs on by default, richer debug logs opt-in,
      and exact payload traces reserved for explicit deep debugging.
    categories: [observability, operability]

  - id: correlate-all-llm-events
    title: Correlate LLM events with stable ids
    summary: >
      Session id, turn id, provider id, model id, and tool call id should be
      present in logs so overlapping turns and tool activity stay debuggable.
    categories: [observability, operability]

  - id: redact-and-bound-logs-by-default
    title: Redact and bound LLM logs by default
    summary: >
      Default logs should redact secrets and avoid giant raw payload dumps.
      Exact request and response bodies belong behind explicit trace-level logging.
    categories: [observability, safety]

  - id: publish-recovery-playbooks
    title: Keep failure and recovery behavior explicit
    summary: >
      Interrupt, retry, fork, revert, compaction, and recovery paths should be documented
      explicitly instead of being left to operator intuition.
    categories: [recovery, operability]

  - id: use-a-maturity-matrix
    title: Distinguish base runtime from advanced shell layers
    summary: >
      Keep a clear maturity model so teams can tell which features belong to a minimal REPL,
      a full agent shell, or a multi-client shell.
    categories: [architecture, maintainability]

  - id: review-surface-after-mutations
    title: Keep a review surface after mutating actions
    summary: >
      After file-changing tool actions, expose review state such as changed files, diff
      availability, and VCS status instead of leaving that context implicit.
    categories: [ux, operability]

  - id: operator-state-must-stay-visible
    title: Keep important shell state visible
    summary: >
      The shell UI should make runtime mode, operational mode, approval mode, session identity,
      and review availability obvious rather than relying on hidden state.
    categories: [ux, operability]

  - id: progressive-disclosure-in-terminal-ui
    title: Use progressive disclosure in the terminal interface
    summary: >
      Keep the main interaction area focused, then use dialogs, side panels, palettes,
      and status views for permissions, sessions, review state, and configuration.
    categories: [ux, architecture]

  - id: restrained-terminal-styling
    title: Prefer restrained terminal styling
    summary: >
      Use a conservative, theme-safe terminal palette with bold headers, dim secondary text,
      and a small set of semantic colors instead of custom colors that may fail across themes.
    categories: [ux, maintainability]

  - id: keyboard-first-shell-ux
    title: Keep the shell keyboard-first
    summary: >
      Core workflows should remain fully operable through slash commands, command palettes,
      dialogs, and explicit keybinds without relying on pointer interaction.
    categories: [ux, operability]

  - id: persistent-history-and-transcripts
    title: Persist both history and transcripts
    summary: >
      History makes the REPL usable; transcripts make it reproducible, testable,
      and suitable for downstream audit or regression fixtures.
    categories: [testing, operability]

  - id: structured-rendering
    title: Render structured output instead of raw print strings
    summary: >
      Separate assistant responses, shell output, warnings, and status tables
      so the rendering layer can evolve without breaking the runtime contracts.
    categories: [ux, architecture]

  - id: current-codex-sources-over-legacy-cli
    title: Prefer current Codex docs over legacy CLI docs
    summary: >
      Use the current root Codex docs and current skill samples as the main source for skill
      packaging and instruction-layering patterns. Treat the legacy codex-cli README as
      historical terminal-agent context, not as the current implementation architecture.
    categories: [knowledge, maintainability]

  - id: use-official-sources-as-seeds
    title: Build the runtime from official sources first
    summary: >
      Use Python stdlib docs and framework docs as the stable implementation layer,
      then add Codex-inspired skill patterns and project-specific conventions on top.
    categories: [knowledge, maintainability]
