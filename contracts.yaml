contracts:
  transcript_entry:
    fields:
      - name: timestamp
        type: string
        format: iso8601
      - name: role
        type: string
        allowed: [system, user, assistant, shell]
      - name: mode
        type: string
        allowed: [chat, shell, multiline]
      - name: content
        type: string
      - name: metadata
        type: object
        optional: true

  shell_result:
    fields:
      - name: command
        type: string
      - name: exit_code
        type: integer
      - name: stdout
        type: string
      - name: stderr
        type: string
      - name: started_at
        type: string
        format: iso8601
      - name: finished_at
        type: string
        format: iso8601
      - name: duration_seconds
        type: number

  runtime_state:
    fields:
      - name: mode
        type: string
        allowed: [chat, shell, multiline]
      - name: running
        type: boolean
      - name: history_path
        type: string
        optional: true
      - name: transcript_path
        type: string
        optional: true

  operational_state:
    fields:
      - name: agent_mode
        type: string
        allowed: [plan, build]
      - name: approval_mode
        type: string
        allowed: [suggest, auto_edit, full_auto]
      - name: read_only
        type: boolean

  orchestrator_state:
    fields:
      - name: turn_id
        type: string
      - name: phase
        type: string
        allowed:
          [planning, awaiting_model, awaiting_tool, awaiting_approval, running_tool, reviewing, completed, interrupted]
      - name: active_tool
        type: string
        optional: true
      - name: approval_required
        type: boolean
      - name: automatic_tool_selection
        type: boolean

  routing_policy:
    fields:
      - name: natural_language_primary
        type: boolean
      - name: slash_commands_available
        type: boolean
      - name: mode_switch_required_for_tools
        type: boolean
      - name: manual_shell_escape_hatch
        type: boolean

  workspace_context:
    fields:
      - name: startup_working_directory
        type: boolean
      - name: default_investigation_target
        type: boolean
      - name: explicit_target_override
        type: boolean
      - name: context_visible_to_operator
        type: boolean

  discovery_policy:
    fields:
      - name: safe_read_only_auto_run
        type: boolean
      - name: discovery_before_user_command_request
        type: boolean
      - name: prefer_known_context_before_shell
        type: boolean
      - name: prefer_specialized_read_tools_before_broad_shell
        type: boolean
      - name: ask_only_on_ambiguity_or_approval
        type: boolean
      - name: manual_run_is_override
        type: boolean

  memory_state:
    fields:
      - name: persistent_history_enabled
        type: boolean
      - name: local_draft_history_enabled
        type: boolean
      - name: compaction_enabled
        type: boolean
      - name: project_doc_layers
        type: array

  instruction_layers:
    fields:
      - name: base_instructions
        type: boolean
      - name: developer_instructions
        type: boolean
      - name: project_docs
        type: array
      - name: user_turn
        type: boolean

  prompt_composition:
    fields:
      - name: operational_mode
        type: string
        allowed: [plan, build]
      - name: compact_prompt
        type: boolean
      - name: uses_session_summary
        type: boolean
      - name: uses_tool_state
        type: boolean
      - name: uses_plan_state
        type: boolean

  prompt_templates:
    fields:
      - name: base_template
        type: boolean
      - name: developer_template
        type: boolean
      - name: compact_template
        type: boolean
      - name: plan_template
        type: boolean
      - name: build_template
        type: boolean

  model_selection:
    fields:
      - name: provider_id
        type: string
      - name: model_id
        type: string
      - name: small_model_id
        type: string
        optional: true
      - name: max_output_tokens
        type: integer
        optional: true
      - name: reasoning_effort
        type: string
        optional: true
      - name: variant
        type: string
        optional: true

  token_budget_policy:
    fields:
      - name: context_window_known
        type: boolean
      - name: reserves_instruction_headroom
        type: boolean
      - name: reserves_output_headroom
        type: boolean
      - name: compacts_before_overflow
        type: boolean
      - name: preserves_active_turn_state
        type: boolean

  small_model_policy:
    fields:
      - name: small_model_available
        type: boolean
      - name: small_model_tasks_defined
        type: boolean
      - name: model_switch_visible
        type: boolean
      - name: silent_primary_reasoning_switches_allowed
        type: boolean

  context_budget_policy:
    fields:
      - name: context_window_known
        type: boolean
      - name: reserves_output_headroom
        type: boolean
      - name: compaction_enabled
        type: boolean

  turn_state:
    fields:
      - name: turn_id
        type: string
      - name: phase
        type: string
        allowed:
          [awaiting_model, awaiting_approval, tool_pending, tool_running, tool_completed, interrupted, completed]
      - name: active_tool
        type: string
        optional: true
      - name: interruptible
        type: boolean

  tool_registry:
    fields:
      - name: tool_ids_visible
        type: boolean
      - name: tool_origin_visible
        type: boolean
      - name: tool_schema_visible
        type: boolean
      - name: approval_metadata_visible
        type: boolean

  session_metadata:
    fields:
      - name: session_id
        type: string
      - name: title
        type: string
        optional: true
      - name: parent_session_id
        type: string
        optional: true
      - name: summary
        type: string
        optional: true
      - name: archived_at
        type: string
        format: iso8601
        optional: true
      - name: compacted_at
        type: string
        format: iso8601
        optional: true

  plan_state:
    fields:
      - name: plan_id
        type: string
        optional: true
      - name: current_step
        type: string
        optional: true
      - name: compacted_summary
        type: boolean
      - name: review_required
        type: boolean

  review_state:
    fields:
      - name: changed_files
        type: integer
      - name: vcs_enabled
        type: boolean
      - name: review_available
        type: boolean
      - name: snapshot_enabled
        type: boolean
        optional: true

  evaluation_policy:
    fields:
      - name: contract_checks
        type: boolean
      - name: transcript_checks
        type: boolean
      - name: operator_surface_checks
        type: boolean
      - name: ui_validation
        type: boolean

  llm_observability:
    fields:
      - name: request_logging
        type: boolean
      - name: response_logging
        type: boolean
      - name: stream_event_logging
        type: boolean
      - name: tool_loop_logging
        type: boolean
      - name: redaction_enabled
        type: boolean
      - name: debug_toggle
        type: boolean
      - name: trace_toggle
        type: boolean
      - name: correlation_ids
        type: array
      - name: log_sink_configurable
        type: boolean

  recovery_policy:
    fields:
      - name: interrupt_supported
        type: boolean
      - name: retry_supported
        type: boolean
      - name: fork_supported
        type: boolean
      - name: revert_supported
        type: boolean
        optional: true
      - name: compaction_resume_supported
        type: boolean

  slash_commands:
    built_in:
      - /help
      - /mode <chat|shell|multiline>
      - /status
      - /history [n]
      - /sources
      - /skill
      - /run <shell command>
      - /transcript [path]
      - /clear
      - /quit
