contracts:
  transcript_entry:
    fields:
      - name: timestamp
        type: string
        format: iso8601
      - name: role
        type: string
        allowed: [system, user, assistant, shell]
      - name: mode
        type: string
        allowed: [chat, shell, multiline]
      - name: content
        type: string
      - name: metadata
        type: object
        optional: true

  shell_result:
    fields:
      - name: command
        type: string
      - name: exit_code
        type: integer
      - name: stdout
        type: string
      - name: stderr
        type: string
      - name: started_at
        type: string
        format: iso8601
      - name: finished_at
        type: string
        format: iso8601
      - name: duration_seconds
        type: number

  runtime_state:
    fields:
      - name: mode
        type: string
        allowed: [chat, shell, multiline]
      - name: running
        type: boolean
      - name: history_path
        type: string
        optional: true
      - name: transcript_path
        type: string
        optional: true

  operational_state:
    fields:
      - name: agent_mode
        type: string
        allowed: [plan, build]
      - name: approval_mode
        type: string
        allowed: [suggest, auto_edit, full_auto]
      - name: read_only
        type: boolean

  session_metadata:
    fields:
      - name: session_id
        type: string
      - name: title
        type: string
        optional: true
      - name: parent_session_id
        type: string
        optional: true
      - name: summary
        type: string
        optional: true
      - name: archived_at
        type: string
        format: iso8601
        optional: true
      - name: compacted_at
        type: string
        format: iso8601
        optional: true

  review_state:
    fields:
      - name: changed_files
        type: integer
      - name: vcs_enabled
        type: boolean
      - name: review_available
        type: boolean
      - name: snapshot_enabled
        type: boolean
        optional: true

  slash_commands:
    built_in:
      - /help
      - /mode <chat|shell|multiline>
      - /status
      - /history [n]
      - /sources
      - /skill
      - /run <shell command>
      - /transcript [path]
      - /clear
      - /quit
